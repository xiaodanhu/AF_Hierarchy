dataset_name: finegym_slide  # Use sliding windows dataset for 50% mAP replication
train_split: ['train']
val_split: ['test']
round: 1000
active_learning_method: uniform # dummy name
dataset: {
  # Separate json files for train and val
  train_json_file: /data3/xiaodan8/FineGym/annotation/Dec14/gym99_train_label.txt,
  val_json_file: /data3/xiaodan8/FineGym/annotation/Dec14/gym99_test_label.txt,
  num_classes: 99,
  num_frames: 16,
  # serve as data augmentation
  trunc_thresh: 0.5,
  crop_ratio: [0.9, 1.0],
  max_seq_len: 288,  # Original 50% mAP setting
  # Sliding window parameters (matching original experiment)
  window_length: 32,   # 32 sampled frames per window
  window_stride: 16,   # Stride between windows (50% overlap)
  sample_stride: 16,   # Sample every 16 original frames (stride=16)
  # Video source: True = raw videos (video_raw/), False = cropped clips (videos_Dec14/)
  use_raw_video: True,
  # JPG frame caching: True = cache/load frames as JPG for faster loading (only for use_raw_video=True)
  # Frames are stored in RGB/{youtube_id}/{frame_number}.jpg
  load_jpg: True,
}
model: {
  fpn_type: identity,
  max_buffer_len_factor: 6.0,
  n_mha_win_size: 19,
}
opt: {
  learning_rate: 0.00005190723388143434, # 0.000375 CLIP: 0.0001 VIT: 0.001 vivit: 0.0001
  epochs: 50,
  weight_decay: 0.05,
}
loader: {
  batch_size: 4,
  num_workers: 8,
}
train_cfg: {
  init_loss_norm: 100,
  clip_grad_l2norm: 1.0,
  cls_prior_prob: 0.01,
  center_sample: radius,
  center_sample_radius: 1.5,
}
test_cfg: {
  voting_thresh: 0.7,
  pre_nms_topk: 2000,
  max_seg_num: 200,
  min_score: 0.001,
  # when using external scores, our model is generating "proposals"
  # multiclass_nms: False,
  # ext_score_file: ./data/thumos/annotations/thumos14_cls_scores.pkl,
  # comment out L47-48 and uncomment L50 to disable score fusion
  multiclass_nms: True,
}
output_folder: ./ckpt/
